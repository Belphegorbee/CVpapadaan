<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b262c">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CV Papadaan Patra Jaya - Menu</title>
<style>
/* ... semua CSS sama persis seperti referensimu ... */
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg,#0f4c75,#1b262c); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; flex-direction: column; color: white; overflow-x: hidden; }
.menu-container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
.logo { width: 170px; max-width: 60%; margin-bottom: 20px; }
.form-title { font-size: 22px; color: #0f4c75; font-weight: bold; margin-bottom: 20px; }
.menu-btn { display: block; width: 100%; padding: 14px; margin: 12px 0; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; background: linear-gradient(90deg, #ff7b00, #ffb703); color: white; transition: 0.3s; }
.menu-btn:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
.contact { margin-top: 15px; font-size: 12px; color: #ffb703; cursor: pointer; }
.contact:hover { text-decoration: underline; }
.back-btn { position: fixed; top: 15px; left: 15px; background: #0f4c75; color: white; border: none; padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 1000; box-shadow: 0 5px 10px rgba(0,0,0,0.3); transition: 0.3s; }
.back-btn:hover { background: #1b6ca8; transform: scale(1.05); }
input { width: 100%; padding: 12px; margin-top: 6px; border-radius: 10px; border: 2px solid #e0e0e0; font-weight: bold; font-size: 15px; transition: 0.3s; }
input:focus { border-color: #ff7b00; outline: none; box-shadow: 0 0 6px rgba(255,123,0,0.5); }
label { display: block; margin-top: 15px; font-weight: bold; color: #1b262c; text-align: left; font-size: 14px; }
form button { margin-top: 25px; padding: 14px; width: 100%; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; background: linear-gradient(90deg, #ff7b00, #ffb703); color: white; cursor: pointer; transition: 0.3s; }
form button:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
.notification { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: rgba(15,76,117,0.95); color: white; font-size: 40px; font-weight:bold; padding: 40px 60px; border-radius: 20px; text-align:center; z-index:2000; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
@media (max-width:400px) { .menu-container {padding:18px;} .logo {width:120px;} .menu-btn {font-size:15px; padding:12px;} .back-btn {padding:8px 12px; font-size:14px;} .form-title {font-size:18px; margin-bottom:15px;} }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.65); justify-content:center; align-items:center; z-index:5000; }
.modal-box { background:#ffffff; padding:30px 25px; border-radius:16px; width:320px; max-width:90%; text-align:center; box-shadow:0 15px 40px rgba(0,0,0,0.35); animation:fadeIn 0.2s ease; }
.modal-box h3 { color:#0f4c75; margin-bottom:10px; }
.modal-box p { color:#555; font-size:14px; margin-bottom:15px; }
.modal-box input { width:100%; padding:12px; border-radius:10px; border:2px solid #e0e0e0; margin-bottom:15px; font-size:15px; }
.modal-box input:focus { border-color:#ff7b00; outline:none; }
.modal-actions { display:flex; gap:10px; }
.modal-actions button { flex:1; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
.btn-primary { background:linear-gradient(90deg,#ff7b00,#ffb703); color:white; }
.btn-secondary { background:#e0e0e0; }
@keyframes fadeIn { from{opacity:0; transform:scale(0.95);} to{opacity:1; transform:scale(1);} }
</style>
</head>
<body>

<!-- MENU UTAMA -->
<div id="menu" class="menu-container">
  <img src="image/logo.png" alt="Logo CV Papadaan Patra Jaya" class="logo">
  <button class="menu-btn" onclick="showForm('form1')">Laporan Keuangan AC</button>
  <button class="menu-btn" onclick="showForm('form2')">Laporan Keuangan Instalasi</button>
  <button class="menu-btn" onclick="showForm('absen')">Absen Karyawan</button>
  <div class="contact" onclick="window.open('https://wa.me/qr/3QRYURBTZDKIG1','_blank')">need similiar app? contact me</div>
</div>

<!-- PASSWORD MODAL -->
<div id="passwordModal" class="modal">
  <div class="modal-box">
    <h3>Akses Terbatas</h3>
    <p>Masukkan sandi untuk melanjutkan</p>
    <input type="password" id="passwordInput" placeholder="Masukkan sandi">
    <div class="modal-actions">
      <button class="btn-primary" onclick="checkPassword()">Masuk</button>
      <button class="btn-secondary" onclick="closeModal()">Batal</button>
    </div>
    <p id="errorMsg" style="color:red; display:none; margin-top:10px;">Sandi salah</p>
  </div>
</div>

<!-- FORM1 -->
<div id="form1" class="menu-container" style="display:none;">
  <button class="back-btn" onclick="showMenu()">&#8592; Kembali</button>
  <img src="image/logo.png" class="logo">
  <div class="form-title">LAPORAN KEUANGAN AC</div>
  <form id="form1Form">
    <input type="hidden" name="type" value="form1">
    <label>PEMASUKAN BERSIH</label>
    <input type="number" name="pemasukan_bersih" required>
    <label>PENGELUARAN</label>
    <input type="number" name="pengeluaran" required>
    <label>KETERANGAN</label>
    <input type="text" name="keterangan" required>
    <button type="submit" id="submitBtn1">Kirim Data</button>
  </form>
</div>

<!-- FORM2 -->
<div id="form2" class="menu-container" style="display:none;">
  <button class="back-btn" onclick="showMenu()">&#8592; Kembali</button>
  <img src="image/logo.png" class="logo">
  <div class="form-title">LAPORAN KEUANGAN INSTALASI</div>
  <form id="form2Form">
    <input type="hidden" name="type" value="form2">
    <label>PEMASUKAN BERSIH</label>
    <input type="number" name="pemasukan_bersih" required>
    <label>PENGELUARAN</label>
    <input type="number" name="pengeluaran" required>
    <label>KETERANGAN</label>
    <input type="text" name="keterangan" required>
    <button type="submit" id="submitBtn2">Kirim Data</button>
  </form>
</div>

<!-- FORM ABSEN -->
<div id="absen" class="menu-container" style="display:none;">
  <button class="back-btn" onclick="showMenu()">&#8592; Kembali</button>
  <img src="image/logo.png" class="logo">
  <div class="form-title">ABSEN KARYAWAN</div>
  <form id="absenForm">
    <input type="hidden" name="type" value="absen">
    <label>TANGGAL & JAM</label>
    <input type="datetime-local" name="tanggal" required readonly>
    <label>NAMA</label>
    <input type="text" name="nama" required>
    <label>PEKERJAAN</label>
    <input type="text" name="pekerjaan" required>
    <label>LOKASI</label>
    <input type="text" name="lokasi" id="lokasiInput" required readonly>
    <button type="button" onclick="ambilLokasi()">Ambil Lokasi</button>
    <label>FOTO SELFIE</label>
    <input type="file" accept="image/*" capture="user" id="fotoInput">
    <img id="previewFoto" style="display:none;width:120px;margin-top:10px;border-radius:10px;">
    <button type="submit" id="submitBtn3">Kirim Data</button>
  </form>
</div>

<div id="notif" class="notification">✅<br>Berhasil</div>

<script>
// REGISTER SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js')
    .then(()=>{ console.log('Service Worker registered'); })
    .catch(err=>{ console.log('Service Worker registration failed', err); });
}

// PASSWORD & FORM SWITCH
const APP_PASSWORD = "1122";
let targetForm = null;

function showForm(id) { if(id==='absen'){ openForm(id); return; } targetForm = id; document.getElementById('passwordModal').style.display='flex'; }
function checkPassword(){ const input = document.getElementById('passwordInput').value; const errorMsg = document.getElementById('errorMsg'); if(input === APP_PASSWORD){ closeModal(); openForm(targetForm); }else{ errorMsg.style.display='block'; } }
function closeModal(){ document.getElementById('passwordModal').style.display='none'; document.getElementById('passwordInput').value=''; document.getElementById('errorMsg').style.display='none'; }
function openForm(id){ document.getElementById('menu').style.display='none'; document.getElementById(id).style.display='block'; if(id==='absen'){ const now = new Date(); const local = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'); document.querySelector('#absenForm input[name="tanggal"]').value = local; if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(function(pos){ const lat = pos.coords.latitude; const lon = pos.coords.longitude; const link = "https://maps.google.com/?q="+lat+","+lon; document.getElementById("lokasiInput").value = link; }); } } }
function showMenu(){ const now = new Date(); const local = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'); document.querySelector('#absenForm input[name="tanggal"]').value = local; document.getElementById('menu').style.display='block'; ['form1','form2','absen'].forEach(f=>document.getElementById(f).style.display='none'); }
function showNotification(){ const n = document.getElementById('notif'); n.style.display='block'; setTimeout(()=>{ n.style.display='none'; }, 2000); }

// FORM SUBMIT
const forms = [
  {id:'form1Form', btn:'submitBtn1', url:'https://script.google.com/macros/s/AKfycbw9iY_QpkBhDJwytvVM8VYOROgRJlmDWuJ94coZVb9Mxw9l8-opHeLjXqKRQm4QZpvR/exec'},
  {id:'form2Form', btn:'submitBtn2', url:'https://script.google.com/macros/s/AKfycbw9iY_QpkBhDJwytvVM8VYOROgRJlmDWuJ94coZVb9Mxw9l8-opHeLjXqKRQm4QZpvR/exec'},
  {id:'absenForm', btn:'submitBtn3', url:'https://script.google.com/macros/s/AKfycbw9iY_QpkBhDJwytvVM8VYOROgRJlmDWuJ94coZVb9Mxw9l8-opHeLjXqKRQm4QZpvR/exec'}
];

forms.forEach(f=>{
  const form = document.getElementById(f.id);
  const btn = document.getElementById(f.btn);
  let submitting=false;
  form.addEventListener('submit', e=>{
    e.preventDefault();
    if(submitting) return;
    submitting=true;
    btn.disabled=true;
    btn.innerText="Mengirim...";

    if(f.id==='absenForm'){
      const fotoInput = document.getElementById("fotoInput");
      const file = fotoInput.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = function(evt){
          const formData = new FormData(form);
          formData.append("fotoBase64", evt.target.result);
          fetch(f.url,{method:'POST', body:formData})
            .then(r=>r.text())
            .then(()=>{ showNotification(); form.reset();
              const now = new Date();
              const local = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + 'T' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
              document.querySelector('#absenForm input[name="tanggal"]').value = local;
            })
            .catch(()=>{ showNotification(); })
            .finally(()=>{ submitting=false; btn.disabled=false; btn.innerText='Kirim Data'; });
        }
        reader.readAsDataURL(file);
        return;
      }
    }

    fetch(f.url,{method:'POST', body:new FormData(form)})
      .then(r=>r.text())
      .then(()=>{ showNotification(); form.reset(); })
      .catch(()=>{ showNotification(); })
      .finally(()=>{ submitting=false; btn.disabled=false; btn.innerText='Kirim Data'; });
  });
});

// AMBIL LOKASI & PREVIEW FOTO
function ambilLokasi(){ if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(function(pos){ const lat = pos.coords.latitude; const lon = pos.coords.longitude; const link = "https://maps.google.com/?q="+lat+","+lon; document.getElementById("lokasiInput").value = link; }); } }
document.getElementById("fotoInput").addEventListener("change",function(e){ const file = e.target.files[0]; if(file){ const preview = document.getElementById("previewFoto"); preview.src = URL.createObjectURL(file); preview.style.display = "block"; } });
</script>
</body>
</html>
